<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KPI Card Builder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #f0f2f7;
    --surface:  #ffffff;
    --border:   #e2e8f0;
    --text:     #1e293b;
    --muted:    #64748b;
    --accent:   #2563eb;
    --accent2:  #0f3d8c;
    --positive: #22c55e;
    --negative: #ef4444;
    --danger:   #fee2e2;
    --radius:   12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }
  header { text-align: center; margin-bottom: 40px; }
  header h1 { font-size: 1.75rem; font-weight: 600; letter-spacing: -0.03em; }
  header p  { font-size: 0.9rem; color: var(--muted); margin-top: 6px; }

  .builder { width: 100%; max-width: 780px; display: flex; flex-direction: column; gap: 14px; }

  /* card row: drag | title | value | color | vsm1 | vsa1 | ✕ */
  .card-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 18px 1.8fr 90px 44px 90px 90px 36px;
    gap: 10px;
    align-items: end;
    animation: slideIn 0.18s ease;
    transition: box-shadow 0.15s, opacity 0.15s, border-color 0.15s;
    cursor: default;
  }
  .card-row.dragging {
    opacity: 0.4;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(37,99,235,0.3);
  }
  .card-row.drag-over {
    border-color: var(--accent);
    box-shadow: 0 4px 16px rgba(37,99,235,0.15);
    transform: translateY(-2px);
  }
  @keyframes slideIn {
    from { opacity:0; transform:translateY(-5px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .card-row.total-row {
    border-color: var(--accent);
    border-width: 1.5px;
    background: #f8faff;
    grid-template-columns: 1.8fr 44px;
  }

  /* drag handle */
  .drag-handle {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #cbd5e1;
    cursor: grab;
    font-size: 14px;
    align-self: center;
    padding-bottom: 2px;
    transition: color 0.15s;
    user-select: none;
  }
  .drag-handle:hover { color: var(--muted); }
  .drag-handle:active { cursor: grabbing; }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 0.72rem; font-weight: 500; color: var(--muted); letter-spacing: 0.04em; }
  .field input[type="text"],
  .field input[type="number"] {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .field input:focus { border-color: var(--accent); background: #fff; }

  .color-field { display: flex; flex-direction: column; gap: 5px; }
  .color-field label { font-size: 0.72rem; font-weight: 500; color: var(--muted); letter-spacing: 0.04em; }
  .color-field input[type="color"] {
    width: 44px; height: 34px;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 2px;
    background: var(--bg);
    cursor: pointer;
  }

  .pct-field input { font-family: 'DM Mono', monospace; }
  .pct-field input.pos { color: var(--positive); }
  .pct-field input.neg { color: var(--negative); }

  .remove-btn {
    background: none; border: 1px solid var(--border); border-radius: 7px;
    width: 36px; height: 34px; cursor: pointer; color: var(--muted);
    font-size: 1rem; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s; align-self: flex-end;
  }
  .remove-btn:hover { background: var(--danger); color: var(--negative); border-color: var(--negative); }

  .add-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: none; border: 1.5px dashed var(--border); border-radius: var(--radius);
    padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
    font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.15s; width: 100%;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); background: #f0f5ff; }
  .add-btn .plus-icon {
    width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid currentColor;
    display: flex; align-items: center; justify-content: center; font-size: 1rem; line-height: 1;
  }

  .divider {
    display: flex; align-items: center; gap: 12px;
    color: var(--muted); font-size: 0.75rem; font-weight: 500; letter-spacing: 0.06em;
  }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }

  .actions { display: flex; gap: 10px; margin-top: 6px; }
  .gen-btn {
    flex: 1; padding: 13px; background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    font-weight: 600; cursor: pointer; transition: background 0.15s, transform 0.1s;
  }
  .gen-btn:hover { background: var(--accent2); }
  .gen-btn:active { transform: scale(0.98); }

  .preview-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px; overflow-x: auto;
    display: none; flex-direction: column; gap: 16px;
  }
  .preview-wrap.visible { display: flex; }
  .preview-header { display: flex; justify-content: space-between; align-items: center; }
  .preview-title { font-size: 0.8rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); }

  .copy-btn {
    display: flex; align-items: center; gap: 6px; padding: 7px 14px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500;
    color: var(--text); cursor: pointer; transition: all 0.15s;
  }
  .copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .copy-btn.copied { background: var(--positive); color: #fff; border-color: var(--positive); }
  .pbi-btn { background: #f0f5ff; border-color: #c7d7fe; color: var(--accent2); font-weight: 600; }

  .mode-bar {
    display: flex; gap: 8px;
  }
  .mode-btn {
    flex: 1; padding: 10px 14px;
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500;
    color: var(--muted); cursor: pointer; transition: all 0.15s;
  }
  .mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .mode-btn:not(.active):hover { border-color: var(--accent); color: var(--accent); }

  .op-bar {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px;
    flex-wrap: wrap;
  }
  .op-label { font-size: 0.78rem; font-weight: 500; color: var(--muted); white-space: nowrap; }
  .op-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
  .op-btn {
    padding: 6px 14px;
    background: var(--bg); border: 1.5px solid var(--border); border-radius: 7px;
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500;
    color: var(--muted); cursor: pointer; transition: all 0.15s;
  }
  .op-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .op-btn:not(.active):hover { border-color: var(--accent); color: var(--accent); }
  .pbi-btn:hover { background: var(--accent2); color: #fff; border-color: var(--accent2); }
  .pbi-btn.copied { background: var(--positive); color: #fff; border-color: var(--positive); }

  #svg-preview { display: block; min-width: max-content; }
  .svg-code-wrap {
    background: #f8fafc; border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; max-height: 160px; overflow-y: auto;
  }
  #svg-code { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); white-space: pre; line-height: 1.5; }
</style>
</head>
<body>

<header>
  <h1>KPI Card Builder</h1>
  <p>Total card first. Drag to reorder, pick colours, fill variance — then copy the SVG.</p>
</header>

<div class="builder">


  <div class="mode-bar">
    <button class="mode-btn active" id="mode-operation" onclick="setMode('operation')">
      Operation (Total + Cards)
    </button>
    <button class="mode-btn" id="mode-cards-only" onclick="setMode('cards-only')">
      Cards Only
    </button>
  </div>

  <div id="operation-options">
    <div class="op-bar">
      <span class="op-label">Operation between cards:</span>
      <div class="op-buttons">
        <button class="op-btn active" data-op="+" onclick="setOp(this)">＋ Sum</button>
        <button class="op-btn" data-op="-" onclick="setOp(this)">－ Subtract</button>
        <button class="op-btn" data-op="×" onclick="setOp(this)">× Multiply</button>
        <button class="op-btn" data-op="÷" onclick="setOp(this)">÷ Divide</button>
      </div>
    </div>
    <div id="total-section">
      <div class="divider">TOTAL CARD</div>
      <div class="card-row total-row">
        <div class="field">
          <label>Title</label>
          <input id="total-title" type="text" value="Total Available Cash" placeholder="Total label"/>
        </div>
        <div class="color-field">
          <label>Header</label>
          <input id="total-color" type="color" value="#0f3d8c"/>
        </div>
      </div>
    </div>
  </div>

  <div class="divider">CARDS</div>
  <div id="cards-container"></div>

  <button class="add-btn" onclick="addCard()">
    <span class="plus-icon">+</span>
    Add card
  </button>

  <div class="actions">
    <button class="gen-btn" onclick="generateSVG()">⚡ Generate SVG</button>
  </div>

  <div class="preview-wrap" id="preview-wrap">
    <div class="preview-header">
      <span class="preview-title">Preview</span>
      <div style="display:flex;gap:8px">
        <button class="copy-btn" id="copy-btn" onclick="copySVG()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy SVG
        </button>
        <button class="copy-btn pbi-btn" id="copy-pbi-btn" onclick="copySVGPowerBI()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          Copy for Power BI
        </button>
      </div>
    </div>
    <div id="svg-preview"></div>
    <div class="svg-code-wrap"><pre id="svg-code"></pre></div>
  </div>

</div>

<script>
let cardCount = 0;
let dragSrc = null;
let currentMode = 'operation';   // 'operation' | 'cards-only'
let currentOp   = '+';           // '+' | '-' | '×' | '÷'

function setMode(mode) {
  currentMode = mode;
  document.getElementById('mode-operation').classList.toggle('active', mode === 'operation');
  document.getElementById('mode-cards-only').classList.toggle('active', mode === 'cards-only');
  document.getElementById('operation-options').style.display = mode === 'operation' ? '' : 'none';
}

function setOp(btn) {
  currentOp = btn.dataset.op;
  document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

const PALETTE = ['#2563eb','#0891b2','#059669','#7c3aed','#db2777','#d97706','#dc2626','#475569'];
const defaults = [
  { title:"Cash & Bank Balances",      value:11.9, vsm1:2.3,  vsa1:-1.4, color:'#2563eb' },
  { title:"Available Credit Headroom", value:3.9,  vsm1:5.1,  vsa1:8.7,  color:'#0891b2' },
];

// ── Drag & Drop ──────────────────────────────
function initDrag(row) {
  row.setAttribute('draggable', true);

  row.addEventListener('dragstart', e => {
    dragSrc = row;
    row.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  row.addEventListener('dragend', () => {
    row.classList.remove('dragging');
    document.querySelectorAll('.card-row').forEach(r => r.classList.remove('drag-over'));
    renumberCards();
  });
  row.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (row !== dragSrc) {
      document.querySelectorAll('#cards-container .card-row').forEach(r => r.classList.remove('drag-over'));
      row.classList.add('drag-over');
    }
  });
  row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
  row.addEventListener('drop', e => {
    e.preventDefault();
    row.classList.remove('drag-over');
    if (dragSrc && dragSrc !== row) {
      const container = document.getElementById('cards-container');
      const rows = [...container.querySelectorAll('.card-row')];
      const srcIdx  = rows.indexOf(dragSrc);
      const destIdx = rows.indexOf(row);
      if (srcIdx < destIdx) container.insertBefore(dragSrc, row.nextSibling);
      else                   container.insertBefore(dragSrc, row);
    }
  });
}

// ── Add / Remove ─────────────────────────────
function addCard(d = {}) {
  cardCount++;
  const id = cardCount;
  const defColor = d.color || PALETTE[(cardCount - 1) % PALETTE.length];
  const container = document.getElementById('cards-container');

  const row = document.createElement('div');
  row.className = 'card-row';
  row.id = `card-${id}`;
  row.innerHTML = `
    <div class="drag-handle" title="Drag to reorder">⠿</div>
    <div class="field">
      <label>Title</label>
      <input type="text" id="c${id}-title" value="${d.title||''}" placeholder="Card title"/>
    </div>
    <div class="field">
      <label class="measure-label">Value</label>
      <input type="number" id="c${id}-value" value="${d.value||''}" step="0.01" placeholder="0.0"/>
    </div>
    <div class="color-field">
      <label>Header</label>
      <input type="color" id="c${id}-color" value="${defColor}"/>
    </div>
    <div class="field pct-field">
      <label class="measure-label">vs M-1</label>
      <input type="number" id="c${id}-vsm1" value="${d.vsm1!==undefined?d.vsm1:''}" step="0.1" placeholder="auto"/>
    </div>
    <div class="field pct-field">
      <label class="measure-label">vs A-1</label>
      <input type="number" id="c${id}-vsa1" value="${d.vsa1!==undefined?d.vsa1:''}" step="0.1" placeholder="auto"/>
    </div>
    <button class="remove-btn" onclick="removeCard(${id})" title="Remove">✕</button>
  `;
  container.appendChild(row);
  initDrag(row);
  renumberCards();

  [`c${id}-vsm1`,`c${id}-vsa1`].forEach(fid => {
    const el = document.getElementById(fid);
    colorPct(el);
    el.addEventListener('input', () => colorPct(el));
  });
}

function colorPct(el) {
  const v = parseFloat(el.value);
  el.classList.toggle('pos', !isNaN(v) && v >= 0);
  el.classList.toggle('neg', !isNaN(v) && v < 0);
}

function removeCard(id) {
  document.getElementById(`card-${id}`)?.remove();
  renumberCards();
}

function renumberCards() {
  const rows = document.querySelectorAll('#cards-container .card-row');
  rows.forEach((row, i) => {
    const n = i + 1;
    const labels = row.querySelectorAll('.measure-label');
    if (labels[0]) labels[0].textContent = `Value ${n}`;
    if (labels[1]) labels[1].textContent = `vs M-1 ${n}`;
    if (labels[2]) labels[2].textContent = `vs A-1 ${n}`;
  });
}

// ── Helpers ──────────────────────────────────
function xmlEsc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtVal(val, suffix) {
  const n = parseFloat(val);
  if (isNaN(n)) return `0${suffix}`;
  return `${n % 1 === 0 ? n.toFixed(0) : n}${suffix}`;
}
function fmtPct(val) {
  const n = parseFloat(val);
  if (isNaN(n)) return null;
  return (n >= 0 ? '+' : '') + n.toFixed(1) + '%';
}
function trendColor(val) { return parseFloat(val) >= 0 ? '#22c55e' : '#ef4444'; }
function trendArrow(val) { return parseFloat(val) >= 0 ? '▲' : '▼'; }

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function darken(hex, amt = 30) {
  const r = Math.max(0, parseInt(hex.slice(1,3),16) - amt);
  const g = Math.max(0, parseInt(hex.slice(3,5),16) - amt);
  const b = Math.max(0, parseInt(hex.slice(5,7),16) - amt);
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function getCards() {
  return Array.from(document.querySelectorAll('#cards-container .card-row')).map(row => {
    const id = row.id.replace('card-','');
    return {
      title:  document.getElementById(`c${id}-title`)?.value || '',
      value:  parseFloat(document.getElementById(`c${id}-value`)?.value) || 0,
      color:  document.getElementById(`c${id}-color`)?.value || '#2563eb',
      vsm1:   document.getElementById(`c${id}-vsm1`)?.value,
      vsa1:   document.getElementById(`c${id}-vsa1`)?.value,
      suffix: 'M',
    };
  });
}

function autoVariance(cards, key, totalVal) {
  if (totalVal === 0) return null;
  const allFilled = cards.every(c => c[key] !== '' && !isNaN(parseFloat(c[key])));
  if (!allFilled) return null;
  return (cards.reduce((s, c) => s + c.value * parseFloat(c[key]), 0) / totalVal).toFixed(1);
}

// ── SVG Layout constants ──────────────────────
const VAR_FONT = 11;
const VAR_GAP  = 19;
const HDR_H    = 44;

function varianceRows(cx, yStart, vsm1, vsa1, cardNum, cardW) {
  let out = '', y = yStart;
  const pad = 14;
  const xLeft  = cx - cardW / 2 + pad;
  const xRight = cx + cardW / 2 - pad;
  const suffix = cardNum !== undefined ? ' ' + cardNum : '';
  for (const [lbl, val] of [['M-1'+suffix, vsm1], ['A-1'+suffix, vsa1]]) {
    const pct   = fmtPct(val);
    const color = pct !== null ? trendColor(val) : '#94a3b8';
    const arrow = pct !== null ? trendArrow(val) + ' ' : '';
    const disp  = pct !== null ? pct : 'auto';
    out += `  <text x="${xLeft}" y="${y}" font-family="Segoe UI, sans-serif" font-size="${VAR_FONT}" fill="#94a3b8" text-anchor="start">${xmlEsc(lbl)}</text>\n`;
    out += `  <text x="${xRight}" y="${y}" font-family="Segoe UI, sans-serif" font-size="${VAR_FONT}" font-weight="600" fill="${color}" text-anchor="end">${arrow}${xmlEsc(disp)}</text>\n`;
    y += VAR_GAP;
  }
  return out;
}

function renderCard(svg, x, cardW, cardH, radius, pad, card, isTotal, cardNum, gradId) {
  const cx      = x + cardW / 2;
  const color   = card.color || '#2563eb';
  const darkCol = darken(color, 35);
  const valStr  = fmtVal(card.value, card.suffix || 'M');

  const Y_TITLE = pad + HDR_H / 2 + 4;
  const Y_VAL   = pad + HDR_H + 38;
  const Y_DIV   = pad + HDR_H + 50;
  const Y_VAR1  = pad + HDR_H + 66;

  // ── Gradient definition for header ──
  svg += `  <defs>\n`;
  svg += `    <linearGradient id="${gradId}" x1="0%" y1="0%" x2="100%" y2="100%">\n`;
  svg += `      <stop offset="0%" stop-color="${color}"/>\n`;
  svg += `      <stop offset="100%" stop-color="${darkCol}"/>\n`;
  svg += `    </linearGradient>\n`;
  // Clip path for header
  const clipId = `cl${gradId}`;
  svg += `    <clipPath id="${clipId}"><rect x="${x}" y="${pad}" width="${cardW}" height="${HDR_H+radius}" rx="${radius}"/></clipPath>\n`;
  svg += `  </defs>\n`;

  // Card shadow + white body
  svg += `  <rect x="${x}" y="${pad}" width="${cardW}" height="${cardH}" rx="${radius}" fill="#ffffff" filter="url(#s)"/>\n`;

  // Coloured gradient header
  svg += `  <rect x="${x}" y="${pad}" width="${cardW}" height="${HDR_H}" fill="url(#${gradId})" clip-path="url(#${clipId})"/>\n`;

  // Subtle border on whole card (colour-tinted)
  svg += `  <rect x="${x}" y="${pad}" width="${cardW}" height="${cardH}" rx="${radius}" fill="none" stroke="${color}" stroke-width="${isTotal?2:1}" stroke-opacity="0.4"/>\n`;


  // Title
  svg += `  <text x="${cx}" y="${Y_TITLE}" font-family="Segoe UI, sans-serif" font-size="10.5" font-weight="${isTotal?'700':'600'}" fill="#ffffff" text-anchor="middle" letter-spacing="0.3">${xmlEsc(card.title)}</text>\n`;

  svg += `  <text x="${cx}" y="${Y_VAL}" font-family="Segoe UI, sans-serif" font-size="24" font-weight="${isTotal?'700':'400'}" fill="${color}" text-anchor="middle" letter-spacing="-0.5">${xmlEsc(valStr)}</text>\n`;

  // Divider
  svg += `  <line x1="${x+14}" y1="${Y_DIV}" x2="${x+cardW-14}" y2="${Y_DIV}" stroke="${hexToRgba(color, 0.12)}" stroke-width="1"/>\n`;

  // Variance rows
  svg += varianceRows(cx, Y_VAR1, card.vsm1, card.vsa1, cardNum, cardW);

  return svg;
}

function generateSVG() {
  const cards = getCards();
  if (!cards.length) { alert('Add at least one card!'); return; }

  const n = cards.length;
  const CARD_W  = 185;
  const cardH   = HDR_H + 52 + VAR_GAP * 2 + 16;
  const RADIUS  = 12;
  const SYM_R   = 16, GAP = 24, PAD = 10;
  const TOTAL_W = CARD_W + 20;

  // ── Compute total value based on operation ──
  let computedTotal = cards[0]?.value || 0;
  for (let i = 1; i < cards.length; i++) {
    const v = cards[i].value;
    if      (currentOp === '+') computedTotal += v;
    else if (currentOp === '-') computedTotal -= v;
    else if (currentOp === '×') computedTotal *= v;
    else if (currentOp === '÷') computedTotal = v !== 0 ? computedTotal / v : 0;
  }

  // ── Layout ──
  let svgW, x;
  if (currentMode === 'operation') {
    const totalColor = document.getElementById('total-color').value || '#0f3d8c';
    const totalCard = {
      title:  document.getElementById('total-title').value || 'Total',
      suffix: 'M', value: computedTotal, color: totalColor,
      vsm1: autoVariance(cards, 'vsm1', computedTotal),
      vsa1: autoVariance(cards, 'vsa1', computedTotal),
    };
    const totalX = PAD;
    const eq_cx  = totalX + TOTAL_W + GAP;
    x = eq_cx + GAP;
    let lastX = x;
    for (let i = 0; i < n - 1; i++) lastX = lastX + CARD_W + GAP * 2;
    svgW = lastX + CARD_W + PAD;
    const svgH = cardH + PAD * 2;
    const cy   = svgH / 2;

    let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}">\n`;
    svg += `  <defs>\n    <filter id="s" x="-8%" y="-8%" width="120%" height="130%">\n      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#94a3b8" flood-opacity="0.22"/>\n    </filter>\n  </defs>\n`;
    svg += `  <rect width="${svgW}" height="${svgH}" fill="#f0f2f7"/>\n`;

    svg = renderCard(svg, totalX, TOTAL_W, cardH, RADIUS, PAD, totalCard, true, undefined, 'g0');

    // = symbol
    svg += `  <circle cx="${eq_cx}" cy="${cy}" r="${SYM_R}" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#s)"/>\n`;
    svg += `  <rect x="${eq_cx-6}" y="${cy-4}" width="12" height="2" rx="1" fill="#94a3b8"/>\n`;
    svg += `  <rect x="${eq_cx-6}" y="${cy+2}" width="12" height="2" rx="1" fill="#94a3b8"/>\n`;

    x = eq_cx + GAP;
    cards.forEach((card, i) => {
      svg = renderCard(svg, x, CARD_W, cardH, RADIUS, PAD, card, false, i+1, `g${i+1}`);
      if (i < n - 1) {
        const scx = x + CARD_W + GAP;
        svg += `  <circle cx="${scx}" cy="${cy}" r="${SYM_R}" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#s)"/>\n`;
        // Draw the operation symbol
        if (currentOp === '+') {
          svg += `  <rect x="${scx-6}" y="${cy-1}" width="12" height="2" rx="1" fill="#94a3b8"/>\n`;
          svg += `  <rect x="${scx-1}" y="${cy-6}" width="2" height="12" rx="1" fill="#94a3b8"/>\n`;
        } else if (currentOp === '-') {
          svg += `  <rect x="${scx-6}" y="${cy-1}" width="12" height="2" rx="1" fill="#94a3b8"/>\n`;
        } else if (currentOp === '×') {
          svg += `  <line x1="${scx-5}" y1="${cy-5}" x2="${scx+5}" y2="${cy+5}" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>\n`;
          svg += `  <line x1="${scx+5}" y1="${cy-5}" x2="${scx-5}" y2="${cy+5}" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>\n`;
        } else if (currentOp === '÷') {
          svg += `  <rect x="${scx-6}" y="${cy-1}" width="12" height="2" rx="1" fill="#94a3b8"/>\n`;
          svg += `  <circle cx="${scx}" cy="${cy-6}" r="2" fill="#94a3b8"/>\n`;
          svg += `  <circle cx="${scx}" cy="${cy+6}" r="2" fill="#94a3b8"/>\n`;
        }
        x = scx + GAP;
      }
    });

    svg += `\n</svg>`;
    document.getElementById('svg-preview').innerHTML = svg;
    document.getElementById('svg-code').textContent = svg;
    window._generatedSVG = svg;

  } else {
    // Cards only mode — no total, no symbols
    let lastX = PAD;
    for (let i = 0; i < n - 1; i++) lastX = lastX + CARD_W + GAP;
    svgW = lastX + CARD_W + PAD;
    const svgH = cardH + PAD * 2;

    let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}">\n`;
    svg += `  <defs>\n    <filter id="s" x="-8%" y="-8%" width="120%" height="130%">\n      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#94a3b8" flood-opacity="0.22"/>\n    </filter>\n  </defs>\n`;
    svg += `  <rect width="${svgW}" height="${svgH}" fill="#f0f2f7"/>\n`;

    x = PAD;
    cards.forEach((card, i) => {
      svg = renderCard(svg, x, CARD_W, cardH, RADIUS, PAD, card, false, i+1, `gc${i+1}`);
      x += CARD_W + GAP;
    });

    svg += `\n</svg>`;
    document.getElementById('svg-preview').innerHTML = svg;
    document.getElementById('svg-code').textContent = svg;
    window._generatedSVG = svg;
  }

  const wrap = document.getElementById('preview-wrap');
  wrap.classList.add('visible');
  wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
  // early return to skip the duplicate lines below
  return;

  // (unreachable placeholders kept for structure)
  let svgPlaceholder = '';
  cards.forEach((card, i) => {});

}

function copySVG() {
  if (!window._generatedSVG) return;
  const markCopied = () => {
    const btn = document.getElementById('copy-btn');
    btn.classList.add('copied');
    btn.textContent = '\u2713 Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy SVG';
    }, 2000);
  };
  function fallbackCopy() {
    const ta = document.createElement('textarea');
    ta.value = window._generatedSVG;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy'); markCopied(); }
    catch(e) { alert('Copy failed — please manually select the code below.'); }
    document.body.removeChild(ta);
  }
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(window._generatedSVG).then(markCopied).catch(fallbackCopy);
  } else { fallbackCopy(); }
}


function buildDAX() {
  if (!window._generatedSVG) return null;
  const cards = getCards();
  const n = cards.length;
  let varLines = [];

  // ── 1. Main value vars ────────────────────────────────────────────────
  varLines.push('-- ① Replace each 0 below with your actual DAX measure');
  for (let i = 0; i < n; i++) {
    varLines.push(`VAR _Value${i+1} = 0  -- [${cards[i].title || 'Measure ' + (i+1)}]`);
  }
  varLines.push('');

  // ── 2. M-1 and A-1 raw values ────────────────────────────────────────
  varLines.push('-- ② Variance values (vs previous month / previous year)');
  for (let i = 0; i < n; i++) {
    varLines.push(`VAR _M1_${i+1} = 0  -- vs M-1 for card ${i+1}`);
    varLines.push(`VAR _A1_${i+1} = 0  -- vs A-1 for card ${i+1}`);
  }
  varLines.push('');

  // ── 3. Color vars ─────────────────────────────────────────────────────
  varLines.push('-- ③ Colors: black=0, green>0, red<0');
  for (let i = 0; i < n; i++) {
    varLines.push(`VAR _ColorM1_${i+1} = IF(_M1_${i+1} = 0, "#000000", IF(_M1_${i+1} > 0, "#22c55e", "#ef4444"))`);
    varLines.push(`VAR _ColorA1_${i+1} = IF(_A1_${i+1} = 0, "#000000", IF(_A1_${i+1} > 0, "#22c55e", "#ef4444"))`);
  }
  varLines.push('');

  // ── 4. Arrow vars ─────────────────────────────────────────────────────
  varLines.push('-- ④ Arrows: ▲ up, ▼ down, ■ zero');
  for (let i = 0; i < n; i++) {
    varLines.push(`VAR _ArrowM1_${i+1} = IF(_M1_${i+1} = 0, "■", IF(_M1_${i+1} > 0, "▲", "▼"))`);
    varLines.push(`VAR _ArrowA1_${i+1} = IF(_A1_${i+1} = 0, "■", IF(_A1_${i+1} > 0, "▲", "▼"))`);
  }
  varLines.push('');

  // ── 5. Formatted pct vars ─────────────────────────────────────────────
  varLines.push('-- ⑤ Formatted percentages  e.g. +8.7%  -1.4%  0.0%');
  for (let i = 0; i < n; i++) {
    varLines.push(`VAR _FmtM1_${i+1} = IF(_M1_${i+1} = 0, "0.0%", FORMAT(_M1_${i+1}, "+0.0%;-0.0%"))`);
    varLines.push(`VAR _FmtA1_${i+1} = IF(_A1_${i+1} = 0, "0.0%", FORMAT(_A1_${i+1}, "+0.0%;-0.0%"))`);
  }

  // ── 6. Total ──────────────────────────────────────────────────────────
  if (currentMode === 'operation') {
    varLines.push('');
    let totalExpr = '_Value1';
    for (let i = 1; i < n; i++) {
      if      (currentOp === '+') totalExpr += ` + _Value${i+1}`;
      else if (currentOp === '-') totalExpr += ` - _Value${i+1}`;
      else if (currentOp === '×') totalExpr += ` * _Value${i+1}`;
      else if (currentOp === '÷') totalExpr += ` / _Value${i+1}`;
    }
    varLines.push('-- ⑥ Total card');
    varLines.push(`VAR _Total         = ${totalExpr}`);
    varLines.push(`VAR _TotalM1       = 0  -- replace with total vs M-1`);
    varLines.push(`VAR _TotalA1       = 0  -- replace with total vs A-1`);
    varLines.push(`VAR _ColorTotalM1  = IF(_TotalM1 = 0, "#000000", IF(_TotalM1 > 0, "#22c55e", "#ef4444"))`);
    varLines.push(`VAR _ColorTotalA1  = IF(_TotalA1 = 0, "#000000", IF(_TotalA1 > 0, "#22c55e", "#ef4444"))`);
    varLines.push(`VAR _ArrowTotalM1  = IF(_TotalM1 = 0, "■", IF(_TotalM1 > 0, "▲", "▼"))`);
    varLines.push(`VAR _ArrowTotalA1  = IF(_TotalA1 = 0, "■", IF(_TotalA1 > 0, "▲", "▼"))`);
    varLines.push(`VAR _FmtTotalM1    = IF(_TotalM1 = 0, "0.0%", FORMAT(_TotalM1, "+0.0%;-0.0%"))`);
    varLines.push(`VAR _FmtTotalA1    = IF(_TotalA1 = 0, "0.0%", FORMAT(_TotalA1, "+0.0%;-0.0%"))`);
  }

  const daxVars = varLines.join('\n');

  // ── 7. Replace static values in SVG with DAX var references ──────────
  // After single-quote conversion, variance value text nodes look like:
  //   fill='#COLOR' text-anchor='end'>▲ +8.7%</text>
  // We replace fill color + content with DAX vars in order:
  //   operation mode: [totalM1, totalA1, card1M1, card1A1, card2M1, card2A1, ...]
  //   cards-only mode: [card1M1, card1A1, card2M1, card2A1, ...]

  let svgStr = window._generatedSVG.replace(/"/g, "'");

  // Build ordered list of DAX variable sets to inject
  const varSets = [];
  if (currentMode === 'operation') {
    varSets.push({ color: '_ColorTotalM1', arrow: '_ArrowTotalM1', fmt: '_FmtTotalM1' });
    varSets.push({ color: '_ColorTotalA1', arrow: '_ArrowTotalA1', fmt: '_FmtTotalA1' });
  }
  for (let i = 0; i < n; i++) {
    varSets.push({ color: `_ColorM1_${i+1}`, arrow: `_ArrowM1_${i+1}`, fmt: `_FmtM1_${i+1}` });
    varSets.push({ color: `_ColorA1_${i+1}`, arrow: `_ArrowA1_${i+1}`, fmt: `_FmtA1_${i+1}` });
  }

  // Replace each variance value text node in order
  let idx = 0;
  svgStr = svgStr.replace(/fill='[^']+' text-anchor='end'>[^<]+<\/text>/g, (match) => {
    if (idx >= varSets.length) return match;
    const v = varSets[idx++];
    return `fill='" & ${v.color} & "' text-anchor='end'>" & ${v.arrow} & " " & ${v.fmt} & "</text>`;
  });

  // Wrap SVG in DAX string concatenation
  const svgDax = `"data:image/svg+xml;utf8,${svgStr}"`;

  const dax =
`-- ============================================================
-- KPI Card Measure  (paste into a New Measure in Power BI)
-- ============================================================

${daxVars}

VAR _SVG =
${svgDax}

RETURN _SVG`;

  return dax;
}

function copySVGPowerBI() {
  const dax = buildDAX();
  if (!dax) return;

  const markCopied = () => {
    const btn = document.getElementById('copy-pbi-btn');
    btn.classList.add('copied');
    btn.textContent = '\u2713 Copied for Power BI!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg> Copy for Power BI';
    }, 2000);
  };

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy'); markCopied(); }
    catch(e) { alert('Copy failed — please manually select the code below.'); }
    document.body.removeChild(ta);
  }

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(dax).then(markCopied).catch(() => fallbackCopy(dax));
  } else { fallbackCopy(dax); }
}
